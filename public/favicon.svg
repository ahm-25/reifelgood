<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#382014" />
      <stop offset="50%" stop-color="#2b1810" />
      <stop offset="100%" stop-color="#160c08" />
    </linearGradient>

    <!-- Luxury Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef1d2" />
      <stop offset="25%" stop-color="#e3b75e" />
      <stop offset="55%" stop-color="#c8932b" />
      <stop offset="80%" stop-color="#e3b75e" />
      <stop offset="100%" stop-color="#9d6d1b" />
    </linearGradient>

    <!-- Inner Glow/Accent Gold -->
    <linearGradient id="innerGold" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecd9bd" />
      <stop offset="50%" stop-color="#d4a341" />
      <stop offset="100%" stop-color="#8c5e14" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Container -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />

  <!-- Outer Golden Border -->
  <rect x="16" y="16" width="480" height="480" rx="128" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.9" />
  
  <!-- Inner Subtle Border -->
  <rect x="36" y="36" width="440" height="440" rx="112" fill="none" stroke="url(#innerGold)" stroke-width="4" opacity="0.4" />

  <!-- Background Subtle Geometric Pattern / Kitchen Cabinet Arch Motif -->
  <path d="M 256 64 C 150 64 88 126 88 232 L 88 384 C 88 410 110 432 136 432 L 376 432 C 402 432 424 410 424 384 L 424 232 C 424 126 362 64 256 64 Z" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.15" />

  <!-- Decorative Corner Accents -->
  <circle cx="72" cy="72" r="6" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="440" cy="72" r="6" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="72" cy="440" r="6" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="440" cy="440" r="6" fill="url(#goldGrad)" opacity="0.6" />

  <!-- Main Emblem: Stylized Arabic Letter "ج" (Jeem for Jory / جوري) combined with Luxury Crown/Kitchen Silhouette -->
  <g filter="url(#shadow)">
    <!-- Crown / Top Arch Flourish -->
    <path d="M 256 120 C 230 150 190 165 156 165 C 175 185 210 195 256 185 C 302 195 337 185 356 165 C 322 165 282 150 256 120 Z" fill="url(#goldGrad)" />
    <circle cx="256" cy="105" r="10" fill="url(#goldGrad)" />

    <!-- Calligraphic "ج" Body (Jeem) -->
    <!-- Top Horizontal/Curved Stroke of Jeem -->
    <path d="M 160 216 C 200 206 270 200 348 220 C 358 223 366 213 360 205 C 330 178 240 185 174 200 C 162 203 152 218 160 216 Z" fill="url(#goldGrad)" />

    <!-- Main Sweeping Curve of Jeem (The Bowl) -->
    <path d="M 334 216 C 270 240 214 265 196 295 C 176 330 190 380 240 405 C 290 430 355 415 382 375 C 394 357 392 342 380 348 C 360 365 315 390 264 376 C 220 364 214 330 234 305 C 254 280 306 256 354 236 C 366 231 356 211 334 216 Z" fill="url(#goldGrad)" filter="url(#glow)" />

    <!-- Diamond Dot of Jeem (نقطة الجيم) -->
    <path d="M 276 276 L 302 302 L 276 328 L 250 302 Z" fill="url(#goldGrad)" />
    
    <!-- Inner Diamond Reflection -->
    <path d="M 276 286 L 292 302 L 276 318 L 260 302 Z" fill="#fef1d2" opacity="0.8" />
  </g>
</svg>
